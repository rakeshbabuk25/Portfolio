<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgHc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f1a"/>
      <stop offset="100%" stop-color="#100a1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgHc)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="52" fill="#080b14"/>
  <text x="30" y="33" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">🏥  Healthcare Analytics Dashboard</text>
  <rect x="650" y="14" width="90" height="26" rx="5" fill="#1e90ff" opacity=".15" stroke="#1e90ff" stroke-width="1"/>
  <text x="695" y="31" fill="#1e90ff" font-family="sans-serif" font-size="11" text-anchor="middle">Power BI</text>

  <!-- KPI cards row -->
  <rect x="30" y="68" width="160" height="72" rx="8" fill="#0f1528" stroke="#1e3a5f" stroke-width="1"/>
  <text x="50" y="88" fill="#8aabcc" font-family="sans-serif" font-size="9" letter-spacing="1">TOTAL PATIENTS</text>
  <text x="50" y="118" fill="white" font-family="sans-serif" font-size="28" font-weight="bold">4,821</text>
  <text x="160" y="118" fill="#00e676" font-family="sans-serif" font-size="11">↑ 12%</text>

  <rect x="205" y="68" width="160" height="72" rx="8" fill="#0f1528" stroke="#1e3a5f" stroke-width="1"/>
  <text x="225" y="88" fill="#8aabcc" font-family="sans-serif" font-size="9" letter-spacing="1">READMISSION RATE</text>
  <text x="225" y="118" fill="#febc2e" font-family="sans-serif" font-size="28" font-weight="bold">8.3%</text>
  <text x="330" y="118" fill="#febc2e" font-family="sans-serif" font-size="11">↓ 2%</text>

  <rect x="380" y="68" width="160" height="72" rx="8" fill="#0f1528" stroke="#1e3a5f" stroke-width="1"/>
  <text x="400" y="88" fill="#8aabcc" font-family="sans-serif" font-size="9" letter-spacing="1">AVG STAY (DAYS)</text>
  <text x="400" y="118" fill="#1e90ff" font-family="sans-serif" font-size="28" font-weight="bold">4.6</text>
