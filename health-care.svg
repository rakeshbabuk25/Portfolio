  <rect x="555" y="68" width="215" height="72" rx="8" fill="#0f1528" stroke="#1e3a5f" stroke-width="1"/>
  <text x="575" y="88" fill="#8aabcc" font-family="sans-serif" font-size="9" letter-spacing="1">SATISFACTION SCORE</text>
  <text x="575" y="118" fill="#00e676" font-family="sans-serif" font-size="28" font-weight="bold">4.7 / 5</text>
