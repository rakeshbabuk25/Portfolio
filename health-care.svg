  <text x="72" y="213" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">1240</text>

  <rect x="105" y="245" width="35" height="75" rx="3" fill="#1e90ff" opacity=".6"/>
  <text x="122" y="336" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Neuro</text>
  <text x="122" y="238" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">940</text>

  <rect x="155" y="255" width="35" height="65" rx="3" fill="#1e90ff" opacity=".5"/>
  <text x="172" y="336" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Ortho</text>
  <text x="172" y="248" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">810</text>

  <rect x="205" y="235" width="35" height="85" rx="3" fill="#9b59b6" opacity=".8"/>
  <text x="222" y="336" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Oncol</text>
  <text x="222" y="228" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">1060</text>

  <rect x="255" y="265" width="35" height="55" rx="3" fill="#1e90ff" opacity=".4"/>
  <text x="272" y="336" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Peds</text>
  <text x="272" y="258" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">680</text>

  <rect x="305" y="278" width="35" height="42" rx="3" fill="#00e676" opacity=".6"/>
  <text x="322" y="336" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Other</text>
  <text x="322" y="271" fill="white" font-family="sans-serif" font-size="8" text-anchor="middle">520</text>

  <!-- RIGHT: Donut chart - outcomes -->
  <rect x="405" y="155" width="365" height="190" rx="8" fill="#0a1020" stroke="#1e3a5f" stroke-width="1"/>
  <text x="425" y="178" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">Patient Outcomes</text>
  <!-- Donut -->
  <circle cx="530" cy="258" r="65" fill="none" stroke="#1e90ff" stroke-width="22" stroke-dasharray="245 163" stroke-dashoffset="0"/>
  <circle cx="530" cy="258" r="65" fill="none" stroke="#00e676" stroke-width="22" stroke-dasharray="98 310" stroke-dashoffset="-245"/>
  <circle cx="530" cy="258" r="65" fill="none" stroke="#febc2e" stroke-width="22" stroke-dasharray="57 351" stroke-dashoffset="-343"/>
  <circle cx="530" cy="258" r="65" fill="none" stroke="#e74c3c" stroke-width="22" stroke-dasharray="8 400" stroke-dashoffset="-400"/>
  <text x="530" y="252" fill="white" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">60%</text>
  <text x="530" y="268" fill="#8aabcc" font-family="sans-serif" font-size="9" text-anchor="middle">Recovered</text>
  <!-- Legend -->
  <rect x="625" y="225" width="10" height="10" rx="2" fill="#1e90ff"/>
  <text x="641" y="234" fill="#8aabcc" font-family="sans-serif" font-size="9">Recovered 60%</text>
  <rect x="625" y="243" width="10" height="10" rx="2" fill="#00e676"/>
  <text x="641" y="252" fill="#8aabcc" font-family="sans-serif" font-size="9">Improved 24%</text>
  <rect x="625" y="261" width="10" height="10" rx="2" fill="#febc2e"/>
  <text x="641" y="270" fill="#8aabcc" font-family="sans-serif" font-size="9">Stable 14%</text>
  <rect x="625" y="279" width="10" height="10" rx="2" fill="#e74c3c"/>
  <text x="641" y="288" fill="#8aabcc" font-family="sans-serif" font-size="9">Critical 2%</text>

  <!-- Bottom row: trend line -->
  <rect x="30" y="358" width="740" height="110" rx="8" fill="#0a1020" stroke="#1e3a5f" stroke-width="1"/>
  <text x="50" y="378" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">Monthly Admissions Trend — 2024</text>
  <!-- Trend line -->
  <polyline points="70,440 130,430 190,435 250,410 310,400 370,415 430,395 490,385 550,380 610,365 670,370 730,358"
