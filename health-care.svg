  <polyline points="70,440 130,430 190,435 250,410 310,400 370,415 430,395 490,385 550,380 610,365 670,370 730,358 730,455 70,455"
    fill="#1e90ff" opacity=".07"/>
  <!-- Month labels -->
  <text x="70" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Jan</text>
  <text x="130" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Feb</text>
  <text x="190" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Mar</text>
  <text x="250" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Apr</text>
  <text x="310" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">May</text>
  <text x="370" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Jun</text>
  <text x="430" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Jul</text>
  <text x="490" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Aug</text>
  <text x="550" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Sep</text>
  <text x="610" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Oct</text>
  <text x="670" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Nov</text>
  <text x="730" y="455" fill="#8aabcc" font-family="sans-serif" font-size="8" text-anchor="middle">Dec</text>

  <text x="400" y="493" fill="#1e90ff" opacity=".3" font-family="sans-serif" font-size="11" text-anchor="middle">Health Care Analytics — Power BI · Patient Outcomes · Admissions</text>
</svg>
