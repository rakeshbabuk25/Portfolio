<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgCyc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080f14"/>
      <stop offset="100%" stop-color="#08100a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgCyc)"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="52" fill="#050b0c"/>
  <text x="30" y="33" fill="white" font-family="sans-serif" font-size="14" font-weight="bold">🚲  Cyclistic Bike-Share — Member vs Casual Rider Analysis</text>
  <rect x="620" y="14" width="150" height="26" rx="5" fill="#34a853" opacity=".15" stroke="#34a853" stroke-width="1"/>
  <text x="695" y="31" fill="#34a853" font-family="sans-serif" font-size="11" text-anchor="middle">Google DA Capstone</text>

  <!-- KPI row -->
  <rect x="30" y="68" width="165" height="66" rx="8" fill="#090f0a" stroke="#1a2a1c" stroke-width="1"/>
  <text x="50" y="87" fill="#7a9a7c" font-family="sans-serif" font-size="9" letter-spacing="1">TOTAL RIDES</text>
  <text x="50" y="116" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">5.7M</text>

  <rect x="207" y="68" width="165" height="66" rx="8" fill="#090f0a" stroke="#1a2a1c" stroke-width="1"/>
  <text x="227" y="87" fill="#7a9a7c" font-family="sans-serif" font-size="9" letter-spacing="1">MEMBER RIDES</text>
  <text x="227" y="116" fill="#34a853" font-family="sans-serif" font-size="24" font-weight="bold">59.7%</text>

  <rect x="384" y="68" width="165" height="66" rx="8" fill="#090f0a" stroke="#1a2a1c" stroke-width="1"/>
  <text x="404" y="87" fill="#7a9a7c" font-family="sans-serif" font-size="9" letter-spacing="1">CASUAL RIDES</text>
  <text x="404" y="116" fill="#febc2e" font-family="sans-serif" font-size="24" font-weight="bold">40.3%</text>

  <rect x="561" y="68" width="209" height="66" rx="8" fill="#090f0a" stroke="#1a2a1c" stroke-width="1"/>
  <text x="581" y="87" fill="#7a9a7c" font-family="sans-serif" font-size="9" letter-spacing="1">AVG RIDE DURATION</text>
  <text x="581" y="108" fill="#febc2e" font-family="sans-serif" font-size="18" font-weight="bold">Casual 23min</text>
  <text x="581" y="128" fill="#34a853" font-family="sans-serif" font-size="16">Member 12min</text>

