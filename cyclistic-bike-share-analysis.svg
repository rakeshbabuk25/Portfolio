  <!-- Month labels -->
  <text x="450" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Jan</text>
  <text x="478" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Feb</text>
  <text x="506" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Mar</text>
  <text x="534" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Apr</text>
  <text x="562" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">May</text>
  <text x="590" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Jun</text>
  <text x="618" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Jul</text>
  <text x="646" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Aug</text>
  <text x="674" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Sep</text>
  <text x="702" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Oct</text>
  <text x="730" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Nov</text>
  <text x="745" y="355" fill="#7a9a7c" font-family="sans-serif" font-size="7" text-anchor="middle">Dec</text>

  <!-- Legend right chart -->
  <rect x="445" y="365" width="8" height="8" fill="#34a853"/>
  <text x="458" y="373" fill="#7a9a7c" font-family="sans-serif" font-size="9">Member</text>
  <rect x="510" y="365" width="8" height="8" fill="#febc2e"/>
  <text x="523" y="373" fill="#7a9a7c" font-family="sans-serif" font-size="9">Casual</text>

  <!-- Bottom: bike type bar -->
  <rect x="30" y="370" width="740" height="98" rx="8" fill="#07100a" stroke="#1a2a1c" stroke-width="1"/>
  <text x="50" y="392" fill="white" font-family="sans-serif" font-size="11" font-weight="bold">Ride Type Usage — Classic vs Electric vs Docked</text>

  <!-- stacked bar member -->
  <text x="50" y="418" fill="#7a9a7c" font-family="sans-serif" font-size="9">Member</text>
  <rect x="110" y="408" width="220" height="18" rx="3" fill="#34a853" opacity=".8"/>
  <rect x="330" y="408" width="155" height="18" rx="3" fill="#1e90ff" opacity=".7"/>
  <rect x="485" y="408" width="40" height="18" rx="3" fill="#9b59b6" opacity=".6"/>
  <text x="220" y="421" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle">Classic 49%</text>
  <text x="407" y="421" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle">Electric 34%</text>

  <text x="50" y="450" fill="#7a9a7c" font-family="sans-serif" font-size="9">Casual</text>
  <rect x="110" y="440" width="185" height="18" rx="3" fill="#febc2e" opacity=".8"/>
  <rect x="295" y="440" width="175" height="18" rx="3" fill="#1e90ff" opacity=".6"/>
  <rect x="470" y="440" width="65" height="18" rx="3" fill="#9b59b6" opacity=".5"/>
  <text x="202" y="453" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle">Classic 41%</text>
  <text x="382" y="453" fill="white" font-family="sans-serif" font-size="9" text-anchor="middle">Electric 39%</text>

  <!-- Legend for types -->
  <rect x="570" y="413" width="8" height="8" fill="#34a853"/>
  <text x="582" y="421" fill="#7a9a7c" font-family="sans-serif" font-size="8">Classic</text>
  <rect x="620" y="413" width="8" height="8" fill="#1e90ff"/>
  <text x="632" y="421" fill="#7a9a7c" font-family="sans-serif" font-size="8">Electric</text>
  <rect x="670" y="413" width="8" height="8" fill="#9b59b6"/>
  <text x="682" y="421" fill="#7a9a7c" font-family="sans-serif" font-size="8">Docked</text>

  <text x="400" y="493" fill="#34a853" opacity=".3" font-family="sans-serif" font-size="11" text-anchor="middle">Cyclistic Bike-Share — R · ggplot2 · Tableau · Google DA Capstone</text>
</svg>
