  <rect x="236" y="248" width="15" height="82" rx="2" fill="#34a853" opacity=".85"/>
  <rect x="252" y="260" width="15" height="70" rx="2" fill="#febc2e" opacity=".85"/>
  <text x="251" y="345" fill="#7a9a7c" font-family="sans-serif" font-size="8" text-anchor="middle">Fri</text>

  <!-- Sat -->
  <rect x="282" y="268" width="15" height="62" rx="2" fill="#34a853" opacity=".7"/>
  <rect x="298" y="245" width="15" height="85" rx="2" fill="#febc2e" opacity=".95"/>
  <text x="297" y="345" fill="#7a9a7c" font-family="sans-serif" font-size="8" text-anchor="middle">Sat</text>

  <!-- Sun -->
  <rect x="328" y="272" width="15" height="58" rx="2" fill="#34a853" opacity=".65"/>
  <rect x="344" y="250" width="15" height="80" rx="2" fill="#febc2e" opacity=".9"/>
  <text x="343" y="345" fill="#7a9a7c" font-family="sans-serif" font-size="8" text-anchor="middle">Sun</text>

  <!-- Legend -->
  <rect x="50" y="355" width="10" height="10" rx="2" fill="#34a853"/>
  <text x="66" y="364" fill="#7a9a7c" font-family="sans-serif" font-size="9">Member</text>
  <rect x="130" y="355" width="10" height="10" rx="2" fill="#febc2e"/>
  <text x="146" y="364" fill="#7a9a7c" font-family="sans-serif" font-size="9">Casual</text>
  <text x="240" y="364" fill="#7a9a7c" font-family="sans-serif" font-size="9" opacity=".7">Casuals peak weekends</text>

  <!-- RIGHT: Monthly trend line chart -->
  <rect x="425" y="148" width="345" height="210" rx="8" fill="#07100a" stroke="#1a2a1c" stroke-width="1"/>
