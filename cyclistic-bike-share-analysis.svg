  <!-- Grouped bars per day -->
  <!-- Mon -->
  <rect x="52" y="250" width="15" height="80" rx="2" fill="#34a853" opacity=".85"/>
  <rect x="68" y="270" width="15" height="60" rx="2" fill="#febc2e" opacity=".75"/>
  <text x="67" y="345" fill="#7a9a7c" font-family="sans-serif" font-size="8" text-anchor="middle">Mon</text>

  <!-- Tue -->
  <rect x="98" y="245" width="15" height="85" rx="2" fill="#34a853" opacity=".85"/>
  <rect x="114" y="275" width="15" height="55" rx="2" fill="#febc2e" opacity=".75"/>
  <text x="113" y="345" fill="#7a9a7c" font-family="sans-serif" font-size="8" text-anchor="middle">Tue</text>

  <!-- Wed -->
  <rect x="144" y="240" width="15" height="90" rx="2" fill="#34a853" opacity=".85"/>
  <rect x="160" y="280" width="15" height="50" rx="2" fill="#febc2e" opacity=".75"/>
