  <text x="154" y="458" fill="#8a7a80" font-family="sans-serif" font-size="8" text-anchor="middle">£50</text>
  <text x="237" y="458" fill="#8a7a80" font-family="sans-serif" font-size="8" text-anchor="middle">£100</text>
  <text x="320" y="458" fill="#8a7a80" font-family="sans-serif" font-size="8" text-anchor="middle">£150</text>
